name: Compiler or CLI bug
description: Report a compiler, CLI, LSP, or C API problem with a reproducible input.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: source
    attributes:
      label: zwgsl source
      description: Paste the smallest `.zw` source that reproduces the problem, or link to a fixture/example.
      render: ruby
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Compiler
        - CLI
        - LSP
        - C API
        - WGSL output
        - GLSL ES 3.0 output
        - Documentation
    validations:
      required: true
  - type: dropdown
    id: target
    attributes:
      label: Output target
      options:
        - WGSL
        - GLSL ES 3.0
        - Not target-specific
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include compiler output, diagnostics, generated shader text, or crash logs.
      render: text
    validations:
      required: true
  - type: input
    id: command
    attributes:
      label: Command
      description: The exact command or editor action you used.
      placeholder: zig-out/bin/zwgsl compile --target wgsl path/to/file.zw
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, CPU architecture, Zig version, zwgsl commit, and editor/client version when relevant.
      placeholder: |
        OS:
        Architecture:
        Zig:
        zwgsl commit:
        Editor or client:
    validations:
      required: true
