version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/playground"
    schedule:
      interval: "weekly"
    groups:
      playground:
        patterns:
          - "*"
