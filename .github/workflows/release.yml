name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  ZIG_VERSION: 0.15.2

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Zig
        run: |
          curl -L "https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-linux-${ZIG_VERSION}.tar.xz" -o zig.tar.xz
          tar -xf zig.tar.xz
          echo "${GITHUB_WORKSPACE}/zig-x86_64-linux-${ZIG_VERSION}" >> "${GITHUB_PATH}"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Check Zig formatting
        run: zig fmt --check build.zig build.zig.zon src tests benchmarks

      - name: Run Zig tests
        run: zig build test

      - name: Build release artifacts
        run: |
          zig build -Doptimize=ReleaseFast
          zig build wasm

      - name: Package release assets
        run: |
          version="${GITHUB_REF_NAME:-manual}"
          package_name="zwgsl-${version}-linux-x86_64"
          package_dir="dist/${package_name}"

          mkdir -p "${package_dir}/bin" "${package_dir}/include" "${package_dir}/lib"
          cp zig-out/bin/zwgsl "${package_dir}/bin/"
          cp zig-out/bin/zwgsl-lsp "${package_dir}/bin/"
          cp zig-out/bin/zwgsl.wasm "${package_dir}/bin/"
          cp zig-out/bin/zwgsl.wasm "dist/zwgsl.wasm"
          cp zig-out/include/zwgsl.h "${package_dir}/include/"
          cp zig-out/lib/libzwgsl.* "${package_dir}/lib/"
          cp README.md LICENSE "${package_dir}/"

          tar -czf "dist/${package_name}.tar.gz" -C dist "${package_name}"
          sha256sum "dist/${package_name}.tar.gz" > "dist/${package_name}.tar.gz.sha256"
          sha256sum "dist/zwgsl.wasm" > "dist/zwgsl.wasm.sha256"

      - name: Package npm compiler
        working-directory: packages/compiler
        run: |
          cp ../../dist/zwgsl.wasm dist/zwgsl.wasm
          npm run check
          npm pack --pack-destination "${GITHUB_WORKSPACE}/dist"
          for asset in "${GITHUB_WORKSPACE}"/dist/*.tgz; do
            sha256sum "${asset}" > "${asset}.sha256"
          done

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: |
            dist/*.tar.gz
            dist/*.tgz
            dist/*.wasm
            dist/*.sha256

  publish:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: package

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: dist

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" dist/* --clobber
          else
            gh release create "${RELEASE_TAG}" dist/* \
              --title "${RELEASE_TAG}" \
              --generate-notes
          fi
