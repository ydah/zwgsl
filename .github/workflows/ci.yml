name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      ZIG_VERSION: 0.15.2

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: playground/package-lock.json

      - name: Install Zig
        run: |
          curl -L "https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-linux-${ZIG_VERSION}.tar.xz" -o zig.tar.xz
          tar -xf zig.tar.xz
          echo "${GITHUB_WORKSPACE}/zig-x86_64-linux-${ZIG_VERSION}" >> "${GITHUB_PATH}"

      - name: Run Zig tests
        run: zig build test

      - name: Build Zig artifacts
        run: zig build

      - name: Build wasm artifact
        run: zig build wasm

      - name: Install playground dependencies
        working-directory: playground
        run: npm ci

      - name: Build playground
        working-directory: playground
        run: npm run build
