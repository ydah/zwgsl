<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>zwgsl Playground</title>
    <script type="module" src="/src/main.ts"></script>
  </head>
  <body>
    <div id="app">
      <header class="chrome">
        <div>
          <p class="eyebrow">Ruby-inspired shading language</p>
          <h1>zwgsl Playground</h1>
        </div>
        <div class="chrome-actions">
          <label class="sample-picker">
            <span>Sample</span>
            <select id="sample-select"></select>
          </label>
          <button id="compile-button" type="button">Compile</button>
        </div>
      </header>
      <main class="grid">
        <section class="panel editor-panel">
          <div class="panel-header">
            <span>Source</span>
            <div class="panel-actions">
              <span id="status">idle</span>
              <button class="toolbar-button" id="download-source-button" type="button">Download .zw</button>
            </div>
          </div>
          <div id="editor"></div>
        </section>
        <section class="stack">
          <section class="panel">
            <div class="panel-header">
              <span>WGSL</span>
              <div class="output-tabs" id="output-tabs" role="group" aria-label="Generated output">
                <button class="output-tab" type="button" data-output-tab="all" aria-pressed="true">All</button>
                <button class="output-tab" type="button" data-output-tab="vertex">Vertex</button>
                <button class="output-tab" type="button" data-output-tab="fragment">Fragment</button>
                <button class="output-tab" type="button" data-output-tab="compute">Compute</button>
                <button class="output-tab" type="button" data-output-tab="diagnostics">Diagnostics</button>
                <button class="output-tab" type="button" data-output-tab="resources">Resources</button>
              </div>
              <div class="panel-actions">
                <button class="toolbar-button" id="copy-diagnostics-button" type="button" disabled>Copy diag</button>
                <button class="toolbar-button" id="copy-wgsl-button" type="button" disabled>Copy WGSL</button>
                <button class="toolbar-button" id="download-wgsl-button" type="button" disabled>Download WGSL</button>
              </div>
            </div>
            <pre id="wgsl-output"></pre>
          </section>
          <section class="panel preview-panel">
            <div class="panel-header">
              <span>Preview</span>
              <span id="preview-status">booting</span>
            </div>
            <div class="preview-shell">
              <canvas id="preview-canvas"></canvas>
              <aside class="uniforms" id="uniform-controls"></aside>
            </div>
          </section>
        </section>
      </main>
    </div>
  </body>
</html>
